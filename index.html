<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HKUGAPS 獎項分析系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8D5A0;
    --gold-dark: #8B6914;
    --ink: #1A1208;
    --parchment: #F8F3E8;
    --parchment-dark: #EDE5D0;
    --red: #8B1A1A;
    --red-light: #C44;
    --jade: #2D6B4A;
    --jade-light: #3D9B6A;
    --sky: #1A4A7A;
    --muted: #6B5D45;
    --shadow: rgba(26,18,8,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--ink) 0%, #3A2808 100%);
    padding: 32px 40px 24px;
    border-bottom: 3px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(201,168,76,0.04) 20px, rgba(201,168,76,0.04) 40px);
  }
  .header-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
  .header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 28px; font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .header p { color: var(--gold-light); font-size: 13px; font-weight: 300; letter-spacing: 0.1em; }
  .header-stats {
    display: flex; gap: 32px; margin-top: 20px; flex-wrap: wrap;
  }
  .hstat {
    text-align: center;
    border-left: 1px solid rgba(201,168,76,0.3);
    padding-left: 24px;
  }
  .hstat:first-child { border-left: none; padding-left: 0; }
  .hstat-num { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 700; color: var(--gold); }
  .hstat-label { font-size: 11px; color: var(--gold-light); opacity: 0.7; margin-top: 2px; }

  /* TABS */
  .tabs {
    background: var(--ink);
    display: flex; gap: 0;
    overflow-x: auto;
    border-bottom: 2px solid var(--gold-dark);
  }
  .tab {
    padding: 12px 24px;
    color: var(--gold-light); opacity: 0.6;
    cursor: pointer; font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    user-select: none;
    letter-spacing: 0.05em;
  }
  .tab:hover { opacity: 0.9; }
  .tab.active {
    color: var(--gold);
    opacity: 1;
    border-bottom-color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  /* MAIN */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  .section { display: none; }
  .section.active { display: block; }

  /* SEARCH PANEL */
  .search-box {
    background: white;
    border: 1px solid var(--gold-light);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .search-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 200px;
    padding: 10px 16px;
    border: 1.5px solid var(--gold-light);
    border-radius: 6px;
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--gold); }
  .btn {
    padding: 10px 20px;
    background: var(--gold-dark);
    color: white;
    border: none; border-radius: 6px;
    cursor: pointer; font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700; letter-spacing: 0.05em;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--gold); }
  .btn-outline {
    background: transparent;
    color: var(--gold-dark);
    border: 1.5px solid var(--gold-dark);
  }
  .btn-outline:hover { background: var(--gold-dark); color: white; }

  /* STUDENT PROFILE */
  .profile-card {
    background: white;
    border: 1px solid var(--gold-light);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 16px var(--shadow);
    margin-bottom: 20px;
  }
  .profile-header {
    background: linear-gradient(135deg, var(--ink), #3A2808);
    padding: 20px 24px;
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 12px;
  }
  .profile-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px; font-weight: 900;
    color: var(--gold);
  }
  .profile-sub { color: var(--gold-light); font-size: 12px; margin-top: 4px; opacity: 0.8; }
  .profile-badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em;
  }
  .badge-gold { background: var(--gold); color: var(--ink); }
  .badge-red { background: var(--red); color: white; }
  .badge-jade { background: var(--jade); color: white; }
  .badge-sky { background: var(--sky); color: white; }

  .profile-body { padding: 20px 24px; }
  .profile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .pstat {
    text-align: center;
    background: var(--parchment);
    border: 1px solid var(--gold-light);
    border-radius: 8px;
    padding: 14px 10px;
  }
  .pstat-num { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 700; color: var(--gold-dark); }
  .pstat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 28px; }
  .timeline::before {
    content: '';
    position: absolute; left: 8px; top: 0; bottom: 0;
    width: 2px; background: var(--gold-light);
  }
  .timeline-year { margin-bottom: 20px; }
  .timeline-year-label {
    position: relative;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px; font-weight: 700;
    color: var(--gold-dark);
    margin-bottom: 10px;
  }
  .timeline-year-label::before {
    content: '';
    position: absolute; left: -24px; top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid white;
    box-shadow: 0 0 0 2px var(--gold);
  }
  .award-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .award-chip {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .chip-academic { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
  .chip-honour { background: #DBEAFE; color: #1E3A8A; border: 1px solid #93C5FD; }
  .chip-conduct { background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }
  .chip-service { background: #FCE7F3; color: #9D174D; border: 1px solid #F9A8D4; }
  .chip-reading { background: #EDE9FE; color: #4C1D95; border: 1px solid #C4B5FD; }
  .chip-special { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
  .chip-scholarship { background: #FEF9C3; color: #713F12; border: 1px solid #FDE047; }

  /* SEARCH RESULTS */
  .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 16px; }
  .result-card {
    background: white;
    border: 1px solid var(--gold-light);
    border-radius: 8px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .result-card:hover {
    border-color: var(--gold);
    box-shadow: 0 4px 16px var(--shadow);
    transform: translateY(-1px);
  }
  .result-name { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700; color: var(--ink); }
  .result-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .result-count { float: right; font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--gold-dark); }

  /* CLASS ANALYSIS */
  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px; font-weight: 700;
    color: var(--ink);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gold-light);
  }

  .year-filter {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .filter-btn {
    padding: 6px 14px;
    border: 1.5px solid var(--gold-light);
    border-radius: 20px;
    background: white;
    color: var(--muted);
    cursor: pointer; font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold-dark); }
  .filter-btn.active { background: var(--gold-dark); color: white; border-color: var(--gold-dark); }

  .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .class-card {
    background: white;
    border: 1px solid var(--gold-light);
    border-radius: 8px;
    padding: 16px;
    box-shadow: 0 1px 6px var(--shadow);
    transition: all 0.2s;
  }
  .class-card:hover { border-color: var(--gold); box-shadow: 0 4px 16px var(--shadow); }
  .class-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px; font-weight: 900;
    color: var(--gold-dark);
    margin-bottom: 10px;
  }
  .class-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .class-bar-label { font-size: 10px; color: var(--muted); width: 70px; flex-shrink: 0; }
  .class-bar-track {
    flex: 1; height: 6px;
    background: var(--parchment-dark);
    border-radius: 3px; overflow: hidden;
  }
  .class-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .bar-gold { background: var(--gold); }
  .bar-red { background: var(--red-light); }
  .bar-jade { background: var(--jade-light); }
  .bar-sky { background: #4A9CC8; }
  .class-bar-val { font-size: 10px; font-weight: 700; color: var(--ink); width: 24px; text-align: right; }

  /* CHART AREA */
  .chart-container {
    background: white;
    border: 1px solid var(--gold-light);
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 1px 6px var(--shadow);
    margin-bottom: 20px;
  }
  .chart-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 16px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .bar-col-bar {
    width: 100%; max-width: 50px;
    border-radius: 4px 4px 0 0;
    min-height: 4px;
    transition: height 0.6s ease;
    cursor: pointer;
    position: relative;
  }
  .bar-col-bar:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 4px); left: 50%;
    transform: translateX(-50%);
    background: var(--ink); color: white;
    font-size: 11px; padding: 4px 8px; border-radius: 4px;
    white-space: nowrap; pointer-events: none; z-index: 10;
  }
  .bar-col-label { font-size: 10px; color: var(--muted); text-align: center; }

  /* TABLE */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th {
    background: var(--ink);
    color: var(--gold-light);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 11px; letter-spacing: 0.05em;
  }
  .data-table td { padding: 9px 12px; border-bottom: 1px solid var(--parchment-dark); }
  .data-table tr:hover td { background: var(--parchment); }
  .data-table tr:nth-child(even) td { background: #FAFAF7; }
  .data-table tr:nth-child(even):hover td { background: var(--parchment); }
  .rank-cell { font-family: 'Noto Serif TC', serif; font-weight: 700; color: var(--gold-dark); }

  /* EMPTY / LOADING */
  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  /* TWO COL */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) {
    .two-col { grid-template-columns: 1fr; }
    .header h1 { font-size: 20px; }
    .tab { padding: 10px 14px; font-size: 12px; }
  }

  /* LEADERBOARD */
  .lb-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--parchment-dark);
    cursor: pointer;
    transition: background 0.15s;
  }
  .lb-row:hover { background: var(--parchment); }
  .lb-rank {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px; font-weight: 900;
    color: var(--gold-dark); width: 32px;
    text-align: center;
  }
  .lb-rank.top1 { color: #C9A84C; }
  .lb-rank.top2 { color: #9A9A9A; }
  .lb-rank.top3 { color: #8B5E3C; }
  .lb-name { flex: 1; font-weight: 600; font-size: 14px; }
  .lb-meta { font-size: 11px; color: var(--muted); }
  .lb-count { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--gold-dark); }

  /* scroll fix */
  .scroll-box { max-height: 400px; overflow-y: auto; border: 1px solid var(--gold-light); border-radius: 8px; background: white; }

  /* pill stats row */
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .pill { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1.5px solid; }

  .note { font-size: 12px; color: var(--muted); margin-top: 8px; font-style: italic; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>港大同學會小學 · 獎項分析系統</h1>
    <p>HKUGAPS Award Analytics · 2018-2019 至 2025-2026 學年</p>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-num" id="hstat-years">5</div><div class="hstat-label">學年</div></div>
      <div class="hstat"><div class="hstat-num" id="hstat-records">—</div><div class="hstat-label">獎項記錄</div></div>
      <div class="hstat"><div class="hstat-num" id="hstat-students">—</div><div class="hstat-label">獲獎學生</div></div>
      <div class="hstat"><div class="hstat-num" id="hstat-types">8</div><div class="hstat-label">獎項類別</div></div>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('search')">🔍 學生查詢</div>
  <div class="tab" onclick="switchTab('leaderboard')">🏆 排行榜</div>
  <div class="tab" onclick="switchTab('class')">📊 班級分析</div>
  <div class="tab" onclick="switchTab('overview')">📈 全校統計</div>
</div>

<div class="main">

  <!-- SEARCH TAB -->
  <div class="section active" id="sec-search">
    <div class="search-box">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">輸入學生姓名（中文），查看其獲獎歷程及成長軌跡</div>
      <div class="search-row">
        <input class="search-input" id="searchInput" type="text" placeholder="例：田一苡、黃融、鄭文絢…" oninput="onSearchInput()" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="btn" onclick="doSearch()">查　詢</button>
        <button class="btn btn-outline" onclick="clearSearch()">清　除</button>
      </div>
    </div>
    <div id="searchResults"></div>
    <div id="profileArea"></div>
  </div>

  <!-- LEADERBOARD -->
  <div class="section" id="sec-leaderboard">
    <div class="search-box">
      <div class="year-filter" id="lb-year-filter">
        <button class="filter-btn active" onclick="lbFilterYear('all',this)">全部學年</button>
        <button class="filter-btn" onclick="lbFilterYear('2018-2019',this)">2018-19</button>
        <button class="filter-btn" onclick="lbFilterYear('2019-2020',this)">2019-20</button>
        <button class="filter-btn" onclick="lbFilterYear('2020-2021',this)">2020-21</button>
        <button class="filter-btn" onclick="lbFilterYear('2021-2022',this)">2021-22</button>
        <button class="filter-btn" onclick="lbFilterYear('2022-2023',this)">2022-23</button>
        <button class="filter-btn" onclick="lbFilterYear('2023-2024',this)">2023-24</button>
        <button class="filter-btn" onclick="lbFilterYear('2024-2025',this)">2024-25</button>
        <button class="filter-btn" onclick="lbFilterYear('2025-2026',this)">2025-26</button>
      </div>
      <div class="year-filter" id="lb-type-filter">
        <button class="filter-btn active" onclick="lbFilterType('all',this)">全部獎項</button>
        <button class="filter-btn" onclick="lbFilterType('學科獎',this)">學科獎</button>
        <button class="filter-btn" onclick="lbFilterType('學業卓越獎',this)">學業卓越獎</button>
        <button class="filter-btn" onclick="lbFilterType('良好操行獎',this)">良好操行獎</button>
        <button class="filter-btn" onclick="lbFilterType('服務獎',this)">服務獎</button>
        <button class="filter-btn" onclick="lbFilterType('閱讀',this)">閱讀獎</button>
      </div>
    </div>
    <div class="two-col">
      <div>
        <div class="section-title">🥇 獲獎最多（前50名）</div>
        <div class="scroll-box" id="lb-list"></div>
      </div>
      <div>
        <div class="section-title">📋 獎項類型分布</div>
        <div class="chart-container" id="lb-type-chart"></div>
        <div class="section-title" style="margin-top:16px;">📅 各學年獲獎人次</div>
        <div class="chart-container" id="lb-year-chart"></div>
      </div>
    </div>
  </div>

  <!-- CLASS TAB -->
  <div class="section" id="sec-class">
    <div class="search-box">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px;">比較各班級（A/B/C/D）在不同學年的獎項表現</div>
      <div class="year-filter" id="class-year-filter">
        <button class="filter-btn active" onclick="classFilterYear('all',this)">全部學年</button>
        <button class="filter-btn" onclick="classFilterYear('2018-2019',this)">2018-19</button>
        <button class="filter-btn" onclick="classFilterYear('2019-2020',this)">2019-20</button>
        <button class="filter-btn" onclick="classFilterYear('2020-2021',this)">2020-21</button>
        <button class="filter-btn" onclick="classFilterYear('2021-2022',this)">2021-22</button>
        <button class="filter-btn" onclick="classFilterYear('2022-2023',this)">2022-23</button>
        <button class="filter-btn" onclick="classFilterYear('2023-2024',this)">2023-24</button>
        <button class="filter-btn" onclick="classFilterYear('2024-2025',this)">2024-25</button>
        <button class="filter-btn" onclick="classFilterYear('2025-2026',this)">2025-26</button>
      </div>
      <div class="year-filter" id="class-grade-filter">
        <button class="filter-btn active" onclick="classFilterGrade('all',this)">全部年級</button>
        <button class="filter-btn" onclick="classFilterGrade('1',this)">一年級</button>
        <button class="filter-btn" onclick="classFilterGrade('2',this)">二年級</button>
        <button class="filter-btn" onclick="classFilterGrade('3',this)">三年級</button>
        <button class="filter-btn" onclick="classFilterGrade('4',this)">四年級</button>
        <button class="filter-btn" onclick="classFilterGrade('5',this)">五年級</button>
        <button class="filter-btn" onclick="classFilterGrade('6',this)">六年級</button>
      </div>
    </div>
    <div id="class-overview-area"></div>
    <div class="section-title" style="margin-top:20px;">各班詳細數據</div>
    <div class="chart-container">
      <div class="chart-title">學業卓越獎（全級前十名）— 各班比例</div>
      <div id="honour-chart"></div>
    </div>
    <div id="class-detail-area"></div>
  </div>

  <!-- OVERVIEW TAB -->
  <div class="section" id="sec-overview">
    <div class="two-col">
      <div>
        <div class="section-title">🎖️ 最常見學科獎得主（學科）</div>
        <div class="chart-container">
          <div id="subject-chart"></div>
        </div>
        <div class="section-title">📚 高頻獲獎學生（品學兼優 / 年終獎）</div>
        <div class="scroll-box" id="yearend-list"></div>
      </div>
      <div>
        <div class="section-title">🌟 歷年品學兼優獎得主</div>
        <div class="scroll-box" id="soty-list"></div>
        <div class="section-title" style="margin-top:16px;">💰 獎學金得主一覽</div>
        <div class="scroll-box" id="scholarship-list"></div>
      </div>
    </div>
  </div>

</div>

<script>
// =========================================================
// DATA: All awards from PDFs
// Format: { year, term, type, grade, class, name, detail }
// =========================================================
const RAW = [];

function add(year, term, type, cls, names, detail='') {
  const grade = parseInt(cls[0]);
  const classLetter = cls[1];
  const arr = Array.isArray(names) ? names : [names];
  arr.forEach(n => {
    if(n && n.trim()) RAW.push({year, term, type, grade, classLetter, cls, name: n.trim(), detail});
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const ids = ['search','leaderboard','class','overview'];
    t.classList.toggle('active', ids[i]===tab);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  if(tab==='leaderboard') renderLeaderboard();
  if(tab==='class') renderClass();
  if(tab==='overview') renderOverview();
}

let searchTimeout;
function onSearchInput() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('searchInput').value.trim();
  if(q.length >= 1) {
    searchTimeout = setTimeout(()=>showSuggestions(q), 200);
  } else {
    document.getElementById('searchResults').innerHTML = '';
  }
}

function showSuggestions(q) {
  const matches = allStudents.filter(n=>n.includes(q)).sort((a,b)=>byStudent[b].length-byStudent[a].length).slice(0,20);
  if(!matches.length) {
    document.getElementById('searchResults').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>找不到符合的學生</div>';
    return;
  }
  const html = `<div class="results-grid">`+
    matches.map(n=>`<div class="result-card" onclick="showProfile('${n.replace(/'/g,"\\'")}')">
      <span class="result-count">${byStudent[n].length}</span>
      <div class="result-name">${n}</div>
      <div class="result-meta">${getStudentYears(n)} · ${getStudentClasses(n)}</div>
    </div>`).join('')+`</div>`;
  document.getElementById('searchResults').innerHTML = html;
  document.getElementById('profileArea').innerHTML = '';
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if(!q) return;
  if(byStudent[q]) { showProfile(q); return; }
  showSuggestions(q);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('profileArea').innerHTML = '';
}

function getStudentYears(name) {
  const years = [...new Set(byStudent[name].map(r=>r.year))].sort();
  return years.map(y=>y.replace('-20','-')).join(', ');
}

function getStudentClasses(name) {
  const cls = [...new Set(byStudent[name].map(r=>r.cls))].sort();
  return cls.join(', ');
}

function showProfile(name) {
  const records = byStudent[name] || [];
  if(!records.length) { document.getElementById('profileArea').innerHTML='<div class="empty">找不到學生資料</div>'; return; }

  // Stats
  const byType = {};
  records.forEach(r=>{ byType[r.type]=(byType[r.type]||0)+1; });
  const byYear = {};
  records.forEach(r=>{ byYear[r.year]=(byYear[r.year]||0)+1; });

  const academicCount = (byType['學科獎']||0);
  const honourCount = (byType['學業卓越獎']||0);
  const conductCount = (byType['良好操行獎']||0);
  const serviceCount = (byType['服務獎']||0);
  const readingCount = (byType['閱讀飛躍獎']||0)+(byType['閱讀獎']||0);
  const specialCount = (byType['品學兼優獎']||0)+(byType['學科優異獎']||0)+(byType['傑出品德獎']||0);
  const scholarshipCount = (byType['獎學金']||0);

  // Class progression
  const clsHistory = records.map(r=>r.year+' '+r.cls).filter((v,i,a)=>a.indexOf(v)===i).join(' → ');

  // Timeline
  const yearGroups = {};
  records.forEach(r=>{
    const key = r.year + '|' + r.term;
    if(!yearGroups[key]) yearGroups[key] = {year:r.year, term:r.term, items:[]};
    yearGroups[key].items.push(r);
  });
  const sortedKeys = Object.keys(yearGroups).sort((a,b)=>{
    const [ya,ta]=a.split('|'), [yb,tb]=b.split('|');
    const termOrder={T1:1,T2:2,T3:3,Final:4};
    return ya.localeCompare(yb)||termOrder[ta]-termOrder[tb];
  });

  const termLabel = {T1:'第一學期',T2:'第二學期',T3:'第三學期',Final:'年終'};
  const typeColors = {
    '學科獎':'chip-academic',
    '學業卓越獎':'chip-honour',
    '良好操行獎':'chip-conduct',
    '服務獎':'chip-service',
    '閱讀飛躍獎':'chip-reading',
    '閱讀獎':'chip-reading',
    '品學兼優獎':'chip-special',
    '學科優異獎':'chip-special',
    '傑出品德獎':'chip-special',
    '獎學金':'chip-scholarship',
  };

  const timelineHTML = sortedKeys.map(key=>{
    const g = yearGroups[key];
    const chips = g.items.map(r=>`<span class="award-chip ${typeColors[r.type]||'chip-academic'}">${r.type}${r.detail?' · '+r.detail.substring(0,8):''}</span>`).join('');
    return `<div class="timeline-year">
      <div class="timeline-year-label">${g.year} ${termLabel[g.term]||g.term} (${g.cls||g.items[0].cls})</div>
      <div class="award-chips">${chips}</div>
    </div>`;
  }).join('');

  const badges = [];
  if(scholarshipCount>0) badges.push(`<span class="badge badge-gold">🎓 獎學金</span>`);
  if(specialCount>0) badges.push(`<span class="badge badge-red">⭐ 品學兼優</span>`);
  if(honourCount>=3) badges.push(`<span class="badge badge-sky">🏆 常上榜</span>`);
  if(academicCount>=5) badges.push(`<span class="badge badge-jade">📖 學科達人</span>`);

  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('profileArea').innerHTML = `
  <div class="profile-card">
    <div class="profile-header">
      <div>
        <div class="profile-name">${name}</div>
        <div class="profile-sub">${clsHistory}</div>
      </div>
      <div class="profile-badges">${badges.join('')}</div>
    </div>
    <div class="profile-body">
      <div class="profile-grid">
        <div class="pstat"><div class="pstat-num">${records.length}</div><div class="pstat-label">總獎項次數</div></div>
        <div class="pstat"><div class="pstat-num">${academicCount}</div><div class="pstat-label">學科獎</div></div>
        <div class="pstat"><div class="pstat-num">${honourCount}</div><div class="pstat-label">學業卓越獎</div></div>
        <div class="pstat"><div class="pstat-num">${conductCount}</div><div class="pstat-label">良好操行獎</div></div>
        <div class="pstat"><div class="pstat-num">${serviceCount}</div><div class="pstat-label">服務獎</div></div>
        <div class="pstat"><div class="pstat-num">${specialCount}</div><div class="pstat-label">年終/特別獎</div></div>
        <div class="pstat"><div class="pstat-num">${scholarshipCount}</div><div class="pstat-label">獎學金</div></div>
        <div class="pstat"><div class="pstat-num">${Object.keys(byYear).length}</div><div class="pstat-label">活躍學年</div></div>
      </div>
      <div class="section-title">📅 獲獎時間線</div>
      <div class="timeline">${timelineHTML || '<div class="empty">暫無記錄</div>'}</div>
    </div>
  </div>`;
}

function renderLeaderboard() {
  let data = RAW;
  if(lbYear!=='all') data = data.filter(r=>r.year===lbYear);
  if(lbType!=='all') data = data.filter(r=>r.type.includes(lbType));

  // Student counts
  const counts = {};
  data.forEach(r=>{ counts[r.name]=(counts[r.name]||0)+1; });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,50);

  const rankEmoji = {1:'🥇',2:'🥈',3:'🥉'};
  const html = sorted.map(([name,cnt],i)=>{
    const cls = (i<3)?`top${i+1}`:'';
    const years = lbYear==='all' ? `${[...new Set(data.filter(r=>r.name===name).map(r=>r.year))].length}個學年` : '';
    return `<div class="lb-row" onclick="document.getElementById('searchInput').value='${name.replace(/'/g,"\\'")}';doSearch();switchTab('search')">
      <div class="lb-rank ${cls}">${rankEmoji[i+1]||i+1}</div>
      <div><div class="lb-name">${name}</div><div class="lb-meta">${getStudentClasses(name)} ${years}</div></div>
      <div class="lb-count">${cnt}</div>
    </div>`;
  }).join('');
  document.getElementById('lb-list').innerHTML = html||'<div class="empty">暫無數據</div>';

  // Type chart
  const typeCounts = {};
  data.forEach(r=>{ typeCounts[r.type]=(typeCounts[r.type]||0)+1; });
  const typeEntries = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]);
  const maxType = typeEntries[0]?.[1]||1;
  const typeColors2 = ['#C9A84C','#8B1A1A','#2D6B4A','#1A4A7A','#9D4DBB','#C77B30','#4A7A5A','#2A4A8A'];
  document.getElementById('lb-type-chart').innerHTML = `<div class="chart-title">獎項類型分佈</div>`+
    typeEntries.map(([t,c],i)=>`
    <div class="class-bar-row">
      <div class="class-bar-label" style="width:100px;font-size:11px">${t}</div>
      <div class="class-bar-track"><div class="class-bar-fill" style="width:${Math.round(c/maxType*100)}%;background:${typeColors2[i%typeColors2.length]}"></div></div>
      <div class="class-bar-val">${c}</div>
    </div>`).join('');

  // Year chart
  const yearCounts = {};
  data.forEach(r=>{ yearCounts[r.year]=(yearCounts[r.year]||0)+1; });
  const maxYear = Math.max(...Object.values(yearCounts),1);
  document.getElementById('lb-year-chart').innerHTML = `<div class="chart-title">各學年獎項記錄數</div><div class="bar-chart">`+
    YEARS.filter(y=>yearCounts[y]).map(y=>`
    <div class="bar-col">
      <div class="class-bar-fill bar-gold" style="height:${Math.round(yearCounts[y]/maxYear*130)}px;width:100%;border-radius:3px 3px 0 0" data-tip="${y}: ${yearCounts[y]}次"></div>
      <div class="bar-col-label">${y.replace('20','').replace('-20','-')}</div>
    </div>`).join('')+`</div>`;
}

function renderClass() {
  let data = RAW;
  if(classYear!=='all') data = data.filter(r=>r.year===classYear);
  if(classGrade!=='all') data = data.filter(r=>r.grade===parseInt(classGrade));

  // Aggregate by class letter
  const classCounts = {A:{},B:{},C:{},D:{}};
  const types = ['學科獎','學業卓越獎','良好操行獎','服務獎','品學兼優獎'];
  CLASSES.forEach(cl=>{
    types.forEach(t=>{ classCounts[cl][t]=0; });
    classCounts[cl].total=0;
  });

  data.forEach(r=>{
    if(!CLASSES.includes(r.classLetter)) return;
    classCounts[r.classLetter].total++;
    if(classCounts[r.classLetter][r.type]!==undefined)
      classCounts[r.classLetter][r.type]++;
  });

  const maxTotal = Math.max(...CLASSES.map(c=>classCounts[c].total),1);

  // Overview cards
  const classBarColors = {'學科獎':'bar-gold','學業卓越獎':'bar-sky','良好操行獎':'bar-jade','服務獎':'bar-red','品學兼優獎':'bar-gold'};
  document.getElementById('class-overview-area').innerHTML = `
  <div class="section-title">班別獎項總覽</div>
  <div class="class-grid">
    ${CLASSES.map(cl=>`
    <div class="class-card">
      <div class="class-label">${cl}班</div>
      <div style="text-align:center;margin-bottom:12px">
        <span style="font-family:'Noto Serif TC',serif;font-size:28px;font-weight:700;color:var(--gold-dark)">${classCounts[cl].total}</span>
        <span style="font-size:11px;color:var(--muted);margin-left:4px">總記錄</span>
      </div>
      ${types.map(t=>`
      <div class="class-bar-row">
        <div class="class-bar-label">${t.replace('良好操行獎','操行獎').replace('品學兼優獎','品學兼優')}</div>
        <div class="class-bar-track"><div class="class-bar-fill ${classBarColors[t]}" style="width:${classCounts[cl].total?Math.round(classCounts[cl][t]/classCounts[cl].total*100):0}%"></div></div>
        <div class="class-bar-val">${classCounts[cl][t]}</div>
      </div>`).join('')}
    </div>`).join('')}
  </div>`;

  // Honour list by class
  const honourByCls = {A:0,B:0,C:0,D:0};
  data.filter(r=>r.type==='學業卓越獎').forEach(r=>{ if(CLASSES.includes(r.classLetter)) honourByCls[r.classLetter]++; });
  const maxH = Math.max(...Object.values(honourByCls),1);
  const hColors = {A:'#C9A84C',B:'#2D6B4A',C:'#1A4A7A',D:'#8B1A1A'};
  document.getElementById('honour-chart').innerHTML = `<div class="bar-chart" style="height:120px">
    ${CLASSES.map(cl=>`
    <div class="bar-col">
      <div style="background:${hColors[cl]};height:${Math.round(honourByCls[cl]/maxH*100)}px;width:100%;max-width:60px;border-radius:4px 4px 0 0;min-height:4px"></div>
      <div style="font-family:'Noto Serif TC',serif;font-size:11px;font-weight:700;color:var(--gold-dark)">${honourByCls[cl]}</div>
      <div class="bar-col-label">${cl}班</div>
    </div>`).join('')}
  </div>`;

  // Detail table
  const gradeKeys = classGrade==='all' ? GRADES : [classGrade];
  const yearKeys = classYear==='all' ? YEARS : [classYear];

  // Per grade comparison
  let tableHTML = `<div class="chart-container"><table class="data-table"><thead><tr>
    <th>年級</th><th>A班</th><th>B班</th><th>C班</th><th>D班</th><th>最優班</th>
  </tr></thead><tbody>`;

  gradeKeys.forEach(g=>{
    const gc = {A:0,B:0,C:0,D:0};
    data.filter(r=>r.grade===parseInt(g)&&['學科獎','學業卓越獎'].includes(r.type))
      .forEach(r=>{ if(CLASSES.includes(r.classLetter)) gc[r.classLetter]++; });
    const best = CLASSES.reduce((a,b)=>gc[a]>=gc[b]?a:b);
    tableHTML += `<tr>
      <td style="font-weight:700">${g}年級</td>
      ${CLASSES.map(cl=>`<td style="${cl===best?'font-weight:700;color:var(--gold-dark)':''}">${gc[cl]}</td>`).join('')}
      <td><span class="badge badge-gold">${best}班</span></td>
    </tr>`;
  });
  tableHTML += `</tbody></table></div>`;
  document.getElementById('class-detail-area').innerHTML = tableHTML;
}

function renderOverview() {

  const sotyList = Object.entries(sotyMap).sort((a,b)=>b[1].length-a[1].length);
  document.getElementById('soty-list').innerHTML = sotyList.map(([n,yrs],i)=>`

  // Year end winners leaderboard
  const yearEndTypes = ['品學兼優獎','學科優異獎'];
  const yeCounts = {};
  RAW.filter(r=>yearEndTypes.includes(r.type)).forEach(r=>{ yeCounts[r.name]=(yeCounts[r.name]||0)+1; });
  const yeSorted = Object.entries(yeCounts).sort((a,b)=>b[1]-a[1]).slice(0,30);
  document.getElementById('yearend-list').innerHTML = yeSorted.map(([n,c],i)=>`
  <div class="lb-row" onclick="document.getElementById('searchInput').value='${n.replace(/'/g,"\\'")}';doSearch();switchTab('search')">
    <div class="lb-rank ${i<3?'top'+(i+1):''}">${i+1}</div>
    <div><div class="lb-name">${n}</div><div class="lb-meta">${getStudentYears(n)}</div></div>
    <div class="lb-count">${c}</div>
  </div>`).join('');

  // Scholarship
  const schAll = RAW.filter(r=>r.type==='獎學金');
  document.getElementById('scholarship-list').innerHTML = schAll.map(r=>`
  <div class="lb-row" onclick="document.getElementById('searchInput').value='${r.name.replace(/'/g,"\\'")}';doSearch();switchTab('search')">
    <div style="width:32px;font-size:16px;text-align:center">🎓</div>
    <div><div class="lb-name">${r.name}</div><div class="lb-meta">${r.year} · ${r.cls}</div></div>
  </div>`).join('');
}

// =========================================================
// INIT
// =========================================================
renderLeaderboard();
</script>
</body>
</html>
